# pnpm workspace 定义 — React 中后台前端平台 Monorepo

packages:
  # 共享包
  - 'packages/*'
  # 应用包
  - 'apps/*'

catalog:
  # —— 运行时核心依赖 ——
  react: '19.2.5'
  react-dom: '19.2.5'
  react-router-dom: '^7.15.0'
  zustand: '^5.0.13'

  # —— UI 组件库 ——
  # shadcn/ui 通过 CLI 代码生成，不通过 catalog 声明
  lucide-react: '^0.469'

  # —— 样式 ——
  tailwindcss: '^4'
  '@tailwindcss/vite': '^4'

  # —— HTTP 客户端 ——
  ky: '^1.8'

  # —— 服务端状态管理 ——
  '@tanstack/react-query': '^5'

  # —— 构建工具 ——
  vite: '8.0.10'
  '@vitejs/plugin-react': '6.0.1'

  # —— 类型定义 ——
  '@types/react': '19.2.14'
  '@types/react-dom': '19.2.3'
  '@types/node': '24.12.2'

  # —— 测试 ——
  '@testing-library/dom': '10.4.1'
  '@testing-library/jest-dom': '6.9.1'
  '@testing-library/react': '16.3.2'

  # —— 网络 & Mock ——
  msw: '^2.5'

  # —— Taro 跨端 ——
  '@tarojs/taro': '^4.0.0'
  '@tarojs/components': '^4.0.0'
  '@tarojs/react': '^4.0.0'
  '@tarojs/runtime': '^4.0.0'
  '@tarojs/shared': '^4.0.0'
  '@tarojs/helper': '^4.0.0'
  '@tarojs/cli': '^4.0.0'
  '@tarojs/plugin-framework-react': '^4.0.0'
  '@tarojs/plugin-platform-weapp': '^4.0.0'
  '@tarojs/webpack5-runner': '^4.0.0'

  # —— shadcn/ui 基础设施 ——
  class-variance-authority: '^0.7'
  clsx: '^2.1'
  tailwind-merge: '^2.5'
  '@radix-ui/react-slot': '^1.1'
  '@radix-ui/react-separator': '^1.1'
  '@radix-ui/react-dialog': '^1.1'
  '@radix-ui/react-alert-dialog': '^1.1'
  '@radix-ui/react-dropdown-menu': '^2.1'
  '@radix-ui/react-popover': '^1.1'
  '@radix-ui/react-select': '^2.1'
  '@radix-ui/react-tabs': '^1.1'
  '@radix-ui/react-tooltip': '^1.1'
  '@radix-ui/react-checkbox': '^1.1'
  '@radix-ui/react-radio-group': '^1.1'
  '@radix-ui/react-switch': '^1.1'
  '@radix-ui/react-avatar': '^1.1'
  '@radix-ui/react-progress': '^1.1'
  '@radix-ui/react-scroll-area': '^1.1'
  '@radix-ui/react-accordion': '^1.1'
  '@radix-ui/react-toast': '^1.1'
  '@radix-ui/react-toggle': '^1.1'
  '@radix-ui/react-toggle-group': '^1.1'
  '@radix-ui/react-collapsible': '^1.1'
  '@radix-ui/react-slider': '^1.1'
  '@radix-ui/react-aspect-ratio': '^1.1'
  '@radix-ui/react-label': '^2.1'
  '@radix-ui/react-navigation-menu': '^1.1'
  cmdk: '^1.0'
  vaul: '^1.1'
  react-hook-form: '^7.54'
  '@hookform/resolvers': '^3.9'
  zod: '^3.24'

overrides:
  typescript: '6.0.3'
  vitest: '4.1.5'
  eslint: '9.39.4'
  sass: '1.99.0'
  jsdom: '29.1.0'
