# pnpm workspace 定义 — React 中后台前端平台 Monorepo

packages:
  # 共享包
  - 'packages/*'
  # 应用包
  - 'apps/*'

catalog:
  # —— 运行时核心依赖 ——
  react: '19.2.5'
  react-dom: '19.2.5'
  react-router-dom: '^7.15.0'
  zustand: '^5.0.13'

  # —— UI 组件库 ——
  # shadcn/ui 通过 CLI 代码生成，不通过 catalog 声明
  lucide-react: '^0.469'

  # —— 样式 ——
  tailwindcss: '^4'
  '@tailwindcss/vite': '^4'

  # —— HTTP 客户端 ——
  ky: '^1.8'

  # —— 服务端状态管理 ——
  '@tanstack/react-query': '^5'

  # —— 构建工具 ——
  vite: '8.0.10'
  '@vitejs/plugin-react': '6.0.1'

  # —— 类型定义 ——
  '@types/react': '19.2.14'
  '@types/react-dom': '19.2.3'
  '@types/node': '24.12.2'

  # —— 测试 ——
  '@testing-library/dom': '10.4.1'
  '@testing-library/jest-dom': '6.9.1'
  '@testing-library/react': '16.3.2'

  # —— 网络 & Mock ——
  msw: '^2.5'

  # —— Taro 跨端 ——
  '@tarojs/taro': '^4.0.0'
  '@tarojs/components': '^4.0.0'
  '@tarojs/react': '^4.0.0'
  '@tarojs/runtime': '^4.0.0'
  '@tarojs/shared': '^4.0.0'
  '@tarojs/helper': '^4.0.0'
  '@tarojs/cli': '^4.0.0'
  '@tarojs/plugin-framework-react': '^4.0.0'
  '@tarojs/plugin-platform-weapp': '^4.0.0'
  '@tarojs/webpack5-runner': '^4.0.0'

overrides:
  typescript: '6.0.3'
  vitest: '4.1.5'
  eslint: '9.39.4'
  sass: '1.99.0'
  jsdom: '29.1.0'
