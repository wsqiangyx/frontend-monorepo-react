# pnpm workspace 定义 — React 中后台前端平台 Monorepo

packages:
  # 共享包
  - 'packages/*'
  # 应用包
  - 'apps/*'

catalog:
  # —— 运行时核心依赖 ——
  react: '19.2.5'
  react-dom: '19.2.5'
  react-router-dom: '^7.15.0'
  zustand: '^5.0.13'

  # —— UI 组件库 ——
  antd: '6.3.7'
  '@ant-design/icons': '6.2.2'

  # —— 构建工具 ——
  vite: '8.0.10'
  '@vitejs/plugin-react': '6.0.1'

  # —— 类型定义 ——
  '@types/react': '19.2.14'
  '@types/react-dom': '19.2.3'
  '@types/node': '24.12.2'

  # —— 测试 ——
  '@testing-library/dom': '10.4.1'
  '@testing-library/jest-dom': '6.9.1'
  '@testing-library/react': '16.3.2'

  # —— 网络 & Mock ——
  msw: '^2.5'

  # —— 图表（单包使用，统一版本入口） ——
  '@antv/g2': '^5.2'

overrides:
  axios: '1.16.0'
  typescript: '6.0.3'
  vitest: '4.1.5'
  eslint: '9.39.4'
  sass: '1.99.0'
  unocss: '66.6.8'
  jsdom: '29.1.0'
